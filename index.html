<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>POPGOES Arcade Battle Simulator</title>
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<link rel="stylesheet" href="./arcade_style.css">
	<script src="./arcade_script.js"></script>
</head>

<body onLoad="body_onload()">
	<div class="box box_title">
		<p><b>POPGOES ARCADE BATTLE SIMULATOR</b></p>
	</div>
	<div id="div_menu">
		<div class="box">
			<p id="text_stats_name">error: text_stats_name</p>
		</div>
		<div class="button_zone">
			<button type="button" class="button_wide" onclick="btn_dev_load_battle()">dev: load battle</button>
			<div></div>
			<div class="button_column">
				<button type="button" onclick="btn_dev_min_stats()">dev: min stats</button>
			</div>
			<div class="button_column_right">
				<button type="button" onclick="btn_dev_max_stats()">dev: max stats</button>
			</div>
		</div>
	</div>
	<div id="div_battle_win">
		<div class="button_zone">
			<button type="button" class="button_wide" onclick="btn_battle_back()">BACK</button>
		</div>
	</div>
	<div id="div_battle_lose">
		<div class="button_zone">
			<div class="button_column">
				<button type="button" onclick="btn_battle_back()">BACK</button>
			</div>
			<div class="button_column_right">
				<button type="button" onclick="battle_reset()">RETRY</button>
			</div>
		</div>
	</div>
	<div id="div_battle_enemy">
		<div class="box">
			<p id="text_enemy_atk" class="inline_right">error: text_enemy_atk</p>
			<p id="text_enemy_name" class="inline_left">error: text_enemy_name</p>
			<div class="hp_base">
				<div id="div_enemy_hp_bar" class="hp_bar">
				</div>
			</div>
			<p id="text_enemy_status" class="inline_right">error: text_enemy_status</p>
			<p id="text_enemy_hp" class="inline_left">error: text_enemy_hp</p>
		</div>
	</div>
	<div id="div_battle_buttons">
		<div class="button_zone">
			<div class="button_column">
				<button type="button" onclick="btn_battle_attack()">ATTACK</button>
				<div></div>
				<button type="button" onclick="btn_battle_block()">BLOCK</button>
				<!--
				<div></div>
				<button type="button" onclick="" disabled>____</button>
				<div></div>
				<button type="button" onclick="" disabled>____</button>
				-->
			</div>
			<div class="button_column_right">
				<!--
				<button type="button" onclick="" disabled>____</button>
				<div></div>
				<button type="button" onclick="" disabled>____</button>
				<div></div>
				-->
				<button type="button" onclick="" disabled>____</button>
				<div></div>
				<button type="button" onclick="btn_battle_back()">ESCAPE</button>
			</div>
			<div></div>
			<button type="button" class="button_wide" onclick="btn_battle_info()">INFO</button>
		</div>
	</div>
	<div id="div_battle_player">
		<div class="box">
			<p id="text_player_atk" class="inline_right">error: text_player_atk</p>
			<p id="text_player_name" class="inline_left">error: text_player_name</p>
			<div class="hp_base">
				<div id="div_player_hp_bar" class="hp_bar">
				</div>
			</div>
			<p id="text_player_status" class="inline_right">error: text_player_status</p>
			<p id="text_player_hp" class="inline_left">error: text_player_hp</p>
		</div>
	</div>
	<div id="div_battle_textbox">
		<div class="box">
			<p id="text_output">error: text_output</p>
		</div>
	</div>
</body>

</html>
